<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { background:#000; }
  :root { --red:#ef4444; --muted:#9a9a9e; }
  .card {
    width:1200px; height:675px; position:relative; overflow:hidden;
    background:#000; color:#fff; padding:54px 64px;
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    display:flex; flex-direction:column;
    -webkit-font-smoothing:antialiased;
  }
  /* atmospheric brand glow */
  .card::before {
    content:""; position:absolute; inset:0; pointer-events:none;
    background:
      radial-gradient(680px 520px at 8% 12%, rgba(239,68,68,.20), transparent 62%),
      radial-gradient(720px 560px at 100% 108%, rgba(239,68,68,.14), transparent 60%);
  }
  .streak { position:absolute; left:-160px; width:1500px; height:5px; filter:blur(44px);
    background:var(--red); pointer-events:none; }
  .s1 { top:120px; opacity:.45; transform:rotate(7deg); }
  .s2 { top:520px; opacity:.35; transform:rotate(-6deg); }

  .top { display:flex; justify-content:space-between; align-items:center; position:relative; z-index:2; }
  .logo { height:30px; display:block; }
  .chip { border:1px solid rgba(239,68,68,.4); background:rgba(239,68,68,.10);
    color:#ef8a8a; padding:8px 15px; border-radius:999px; font-size:13px; font-weight:600;
    letter-spacing:.5px; }

  .body { flex:1; display:flex; flex-direction:row; align-items:center; gap:46px; position:relative; z-index:2; min-height:0; }
  .text { width:43%; flex-shrink:0; display:flex; flex-direction:column; }
  .eyebrow { color:var(--red); font-size:15px; font-weight:600; letter-spacing:2.4px; text-transform:uppercase; }
  h1 { font-size:50px; font-weight:600; letter-spacing:-1.6px; line-height:1.04; margin-top:18px; }
  .sub { color:var(--muted); font-size:21px; font-weight:400; line-height:1.36; margin-top:18px; }

  /* browser frame */
  .shot { flex:1; min-width:0; align-self:center; border-radius:14px; overflow:hidden;
    background:#0b0b0b; border:1px solid #242424;
    box-shadow:0 34px 90px rgba(239,68,68,.18), 0 14px 50px rgba(0,0,0,.6);
    display:flex; flex-direction:column; }
  .bar { height:40px; flex-shrink:0; display:flex; align-items:center; gap:8px; padding:0 14px;
    border-bottom:1px solid #1a1a1a; background:#0e0e0e; }
  .dot { width:11px; height:11px; border-radius:50%; }
  .url { margin-left:10px; background:#1a1a1a; color:#9a9a9e; font-size:12px; font-weight:500;
    padding:5px 14px; border-radius:7px; }
  .imgwrap { flex:1; min-height:0; overflow:hidden; }
  .imgwrap img { width:100%; display:block; object-fit:cover; object-position:50% 0; height:100%; }

  /* CTA layout */
  .cta { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; position:relative; z-index:2; gap:0; }
  .cta .eyebrow { letter-spacing:2.8px; }
  .cta h1 { font-size:62px; margin-top:20px; }
  .cta .sub { font-size:24px; margin-top:18px; }
  .ctarow { display:flex; align-items:center; gap:14px; margin-top:34px; }
  .btn { background:var(--red); color:#fff; font-size:18px; font-weight:600; padding:15px 28px;
    border-radius:10px; box-shadow:0 8px 30px rgba(239,68,68,.45); }
  .tick { background:#121212; border:1px solid #2a2a2a; color:#c7c7cc; font-size:17px; font-weight:500;
    padding:14px 18px; border-radius:10px; }
  .montage { display:flex; gap:16px; margin-top:44px; }
  .thumb { width:248px; border-radius:10px; overflow:hidden; border:1px solid #242424; background:#0b0b0b;
    box-shadow:0 18px 50px rgba(0,0,0,.5); }
  .thumb .tbar { height:22px; display:flex; align-items:center; gap:5px; padding:0 9px; border-bottom:1px solid #1a1a1a; background:#0e0e0e; }
  .thumb .tdot { width:6px; height:6px; border-radius:50%; }
  .thumb img { width:100%; height:132px; object-fit:cover; object-position:50% 0; display:block; }
</style>
</head>
<body>
<div id="root"></div>
<script>
  const CARDS = {
    1: {layout:'split', chip:'MAJOR UPDATE', eyebrow:'Avalanche L1 analytics', h1:'Your L1 dashboard just leveled up', sub:'Three brand-new pages. A ground-up redesign. One home for every Avalanche L1.', shot:'overview', url:'l1beat.io'},
    2: {layout:'split', chip:'NEW PAGE', eyebrow:'New · /stablecoins', h1:'Stablecoins on Avalanche, mapped', sub:'Supply, issuers, and chain-by-chain distribution, all in one view.', shot:'stablecoins', url:'l1beat.io/stablecoins'},
    3: {layout:'split', chip:'NEW PAGE', eyebrow:'New · /burn', h1:'Watch AVAX burn. Live.', sub:'Real-time fee burn from every block, with an ambient fireplace mode.', shot:'burn', url:'l1beat.io/burn'},
    4: {layout:'split', chip:'NEW PAGE', eyebrow:'New · /flows', h1:'Follow the value across L1s', sub:'Interchain transfers and bridge flows, visualized as a live Sankey.', shot:'flows', url:'l1beat.io/flows'},
    5: {layout:'split', chip:'REDESIGNED', eyebrow:'Redesigned', h1:'Every page, rebuilt', sub:'Sharper screener, deeper risk and decentralization, real validator stake.', shot:'chain', url:'l1beat.io'},
    6: {layout:'cta', chip:'OUT NOW', eyebrow:'Out now', h1:'Explore it all at l1beat.io', sub:'Free, open analytics for every Avalanche L1. No login required.', url:'l1beat.io'},
  };
  const dots = '<span class="dot" style="background:#ff5f57"></span><span class="dot" style="background:#febc2e"></span><span class="dot" style="background:#28c840"></span>';
  const tdots = '<span class="tdot" style="background:#ff5f57"></span><span class="tdot" style="background:#febc2e"></span><span class="tdot" style="background:#28c840"></span>';
  const params = new URLSearchParams(location.search);
  const c = CARDS[params.get('c') || '1'];
  const LOGO = '../shots/logo-full.png';
  function frame(shot, url){
    return `<div class="shot"><div class="bar">${dots}<span class="url">${url}</span></div>`+
           `<div class="imgwrap"><img src="../shots/${shot}.png"></div></div>`;
  }
  let bodyHtml = '';
  if (c.layout === 'split') {
    bodyHtml = `<div class="body">`+
      `<div class="text"><div class="eyebrow">${c.eyebrow}</div><h1>${c.h1}</h1><div class="sub">${c.sub}</div></div>`+
      frame(c.shot, c.url)+
    `</div>`;
  } else {
    const montShots = [['stablecoins','/stablecoins'],['burn','/burn'],['flows','/flows'],['chain','/chain']];
    const mont = montShots.map(s=>`<div class="thumb"><div class="tbar">${tdots}</div><img src="../shots/${s[0]}.png"></div>`).join('');
    bodyHtml = `<div class="cta">`+
      `<div class="eyebrow">${c.eyebrow}</div><h1>${c.h1}</h1><div class="sub">${c.sub}</div>`+
      `<div class="ctarow"><span class="btn">Open l1beat.io →</span><span class="tick">$AVAX</span><span class="tick">#Avalanche</span></div>`+
      `<div class="montage">${mont}</div>`+
    `</div>`;
  }
  document.getElementById('root').innerHTML =
    `<div class="card"><div class="streak s1"></div><div class="streak s2"></div>`+
    `<div class="top"><img class="logo" src="${LOGO}"><span class="chip">${c.chip}</span></div>`+
    bodyHtml+`</div>`;
</script>
</body>
</html>
